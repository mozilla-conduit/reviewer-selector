name: Run tests

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: pip install -r requirements.txt
      - run: pytest
